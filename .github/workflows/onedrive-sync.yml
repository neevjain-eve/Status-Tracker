name: OneDrive Sync

on:
  workflow_dispatch:
    inputs:
      op:
        description: "pull | upsert | delete"
        required: false
        default: "pull"
      taskId:
        description: "Task ID being changed (upsert/delete)"
        required: false
        default: ""
      payload:
        description: "Full task object as JSON (upsert only)"
        required: false
        default: ""
      actor:
        description: "Who made this change (for the audit trail)"
        required: false
        default: ""
  schedule:
    # Safety-net pull every 15 minutes in case OneDrive was edited outside the app
    - cron: "*/15 * * * *"

# Serialize every run so two edits landing close together can't race each other
# and clobber one another's writes.
concurrency:
  group: onedrive-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install libsodium-wrappers --no-save
        working-directory: .github/scripts

      - name: Run sync
        env:
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          OD_DRIVE_ID: ${{ secrets.OD_DRIVE_ID }}
          OD_ITEM_ID: ${{ secrets.OD_ITEM_ID }}
          GH_PAT_FOR_SECRETS: ${{ secrets.GH_PAT_FOR_SECRETS }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OP: ${{ github.event.inputs.op }}
          TASK_ID: ${{ github.event.inputs.taskId }}
          PAYLOAD: ${{ github.event.inputs.payload }}
          ACTOR: ${{ github.event.inputs.actor }}
        run: node .github/scripts/sync.mjs

      - name: Commit data file if changed
        env:
          OP: ${{ github.event.inputs.op }}
          TASK_ID: ${{ github.event.inputs.taskId }}
          ACTOR: ${{ github.event.inputs.actor }}
        run: |
          if ! git diff --quiet -- data/tasks.json; then
            git config user.name "onedrive-sync-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/tasks.json
            if [ -n "$ACTOR" ] && [ -n "$OP" ]; then
              MSG="$ACTOR: $OP $TASK_ID [skip ci]"
            else
              MSG="Sync tasks from OneDrive [skip ci]"
            fi
            git commit -m "$MSG"
            git push
          else
            echo "No changes to commit."
          fi
